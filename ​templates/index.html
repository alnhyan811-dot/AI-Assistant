<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>موقع المهندس أبو زايد</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #74ebd5, #9face6); min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); text-align: center; width: 80%; max-width: 500px; }
        h1 { color: #2c3e50; }
        input { width: 80%; padding: 15px; margin: 20px 0; border: 2px solid #ddd; border-radius: 10px; }
        button { background: #3498db; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-size: 16px; }
        button:hover { background: #2980b9; }
    </style>
</head>
<body>
    <div class="box">
        <h1>المهندس أبو زايد آل نهيان</h1>
        <p>مرحباً بك في موقعي، كيف يمكنني مساعدتك اليوم؟</p>
        <input type="text" placeholder="اكتب سؤالك هنا...">
        <br>
        <button>إرسال</button>
    </div>
</body>
</html>
