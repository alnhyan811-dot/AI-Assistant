<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>موقع المهندس أبو زايد</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #eef2f3; 
            text-align: center; 
            padding: 100px; 
        }
        .box { 
            background: white; 
            padding: 50px; 
            border-radius: 25px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            display: inline-block; 
            border: 2px solid #3498db;
        }
        h1 { color: #2c3e50; margin-bottom: 20px; }
        p { color: #555; font-size: 1.2em; }
    </style>
</head>
<body>
    <div class="box">
        <h1>مرحباً بكم في مواقع المهندس أبو زايد آل نهيان</h1>
        <p>المساعد الذكي جاهز لخدمتكم</p>
    </div>
</body>
</html>
